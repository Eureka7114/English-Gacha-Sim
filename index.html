    <script>
        // 背景音乐控制逻辑
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        const musicIcon = document.getElementById('music-icon');
        const musicVolume = document.getElementById('music-volume');

        // 初始化音乐设置
        bgMusic.volume = 0.2;

        // 尝试自动播放
        function initBackgroundMusic() {
            const playOnInteraction = () => {
                bgMusic.play().catch(e => {
                    console.log("背景音乐播放需要用户交互：", e);
                });
                document.removeEventListener('click', playOnInteraction);
                document.removeEventListener('keydown', playOnInteraction);
            };
            document.addEventListener('click', playOnInteraction);
            document.addEventListener('keydown', playOnInteraction);
        }

        // 切换音乐播放/暂停
        musicToggle.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log("播放失败：", e));
                musicIcon.className = 'fa fa-pause';
            } else {
                bgMusic.pause();
                musicIcon.className = 'fa fa-music';
            }
        });

        // 显示单词计数变化动画
        function showWordChangeAnimation(change) {
            return new Promise(resolve => {
                const originalText = dom.wordCountEl.textContent;
                const newValue = parseInt(originalText) + change;
                
                dom.wordCountEl.classList.add('word-change');
                if (change > 0) {
                    dom.wordCountEl.classList.add('word-up');
                } else {
                    dom.wordCountEl.classList.add('word-down');
                }
                
                let currentValue = parseInt(originalText);
                const step = change > 0 ? 1 : -1;
                const totalSteps = Math.abs(change);
                let stepCount = 0;
                
                const updateValue = () => {
                    currentValue += step;
                    dom.wordCountEl.textContent = currentValue;
                    stepCount++;
                    
                    if (stepCount < totalSteps) {
                        requestAnimationFrame(updateValue);
                    } else {
                        dom.wordCountEl.classList.remove('word-change', 'word-up', 'word-down');
                        resolve();
                    }
                };
                
                updateValue();
            });
        }

        // 随机获取一个单词
        function getRandomWord() {
            const randomIndex = Math.floor(Math.random() * wordBank.length);

        // 单次抽卡逻辑
        async function singlePull() {
            pulledCount++;
            fiveStarPity++;
            fourStarPity++;
            
            let isFiveStar = false;
            let fiveStarRate = 0.6;
            
            if (fiveStarPity >= 80) {
                isFiveStar = true;
            } else if (fiveStarPity >= 74) {
                fiveStarRate = (fiveStarPity - 73) * 6 + 0.6;
            } else if (fiveStarPity >= 70) {
                fiveStarRate = 3;
            }
            
            if (!isFiveStar) {
                isFiveStar = Math.random() * 100 < fiveStarRate;
            }
            
            let isFourStar = false;
            if (fourStarPity >= 10) {
                isFourStar = !isFiveStar;
            } else if (!isFiveStar) {
                isFourStar = Math.random() * 100 < 13;
            }
            
            if (isFiveStar) {
                fiveStarPity = 0;
                fourStarPity = 0;
            } else if (isFourStar) {
                fourStarPity = 0;
            }
            
            if (isFiveStar || isFourStar) {
                let characterName;
                const fiveStarCharacters = ["Sangonomiya Kokomi", "Keqing", "Qiqi", "Jean", "Mona", "Tighnari", "Dehya", "Ningguang", "Furina"];
                const fourStarCharacters = ["Faruzan", "Rosaria", "Yanfei", "Bennett", "Xiangling", "Barbara", "Xingqiu", "Fischl", "Noelle", "Diona", "Sayu", "Sucrose", "Thoma", "Chongyun", "Beidou"];
                
                if (isFiveStar) {
                    const randomIndex = Math.floor(Math.random() * fiveStarCharacters.length);
                    characterName = fiveStarCharacters[randomIndex];
                    fiveStarCount++;
                    dom.fiveStarSound.currentTime = 0;
                    dom.fiveStarSound.play().catch(e => console.log("音效播放失败:", e));
                } else {
                    const randomIndex = Math.floor(Math.random() * fourStarCharacters.length);
                    characterName = fourStarCharacters[randomIndex];
                    fourStarCount++;
                    dom.fourStarSound.currentTime = 0;
                    dom.fourStarSound.play().catch(e => console.log("音效播放失败:", e));
                }
                
                if (!ownedCharacters[characterName]) {
                    ownedCharacters[characterName] = 1;
                } else {
                    ownedCharacters[characterName]++;
                }
                
                const change = isFiveStar ? -10 : -3;
                const actualChange = Math.max(change, -wordList.length);
                wordList = wordList.slice(0, wordList.length + actualChange);
                
                if (actualChange < 0) {
                    dom.wordDecreaseSound.currentTime = 0;
                    dom.wordDecreaseSound.play().catch(e => console.log("音效播放失败:", e));
                    await showWordChangeAnimation(actualChange);
                }
                
                rareCards.push({
                    name: characterName,
                    isFiveStar: isFiveStar
                });
                
                return {
                    character: {
                        name: characterName,
                        isFiveStar: isFiveStar
                    },
                    wordChange: {
                        change: actualChange,
                        word: null
                    }
                };
            } else {
                const newWord = getRandomWord();
                wordList.push(newWord);
                
                dom.wordIncreaseSound.currentTime = 0;
                dom.wordIncreaseSound.play().catch(e => console.log("音效播放失败:", e));
                await showWordChangeAnimation(1);
                
                return {
                    character: null,
                    wordChange: {
                        change: 1,
                        word: newWord
                    }
                };
            }
        }

                    await new Promise(resolve => {
                        const handleAnimationEnd = () => {
                            pullCard.removeEventListener('animationend', handleAnimationEnd);
                            resolve();
                        };
                        pullCard.addEventListener('animationend', handleAnimationEnd);
                    });
                    
                    const result = await singlePull();
                    const { character, wordChange } = result;
                    
                    if (character) {
                        const characterInfo = phraseDatabase[character.name];
                        pullCard.innerHTML = `
                            <div class="w-full h-full bg-gradient-to-br ${character.isFiveStar ? 'from-amber-900 to-fiveStar/20' : 'from-gray-800 to-fourStar/20'} p-2">

                                    </div>
                                    <img src="${characterInfo.imageUrl}" alt="${character.name}" class="w-24 h-32 mx-auto object-cover rounded mt-2">
                                    <div class="text-xs mt-1">${character.name}</div>
                                    <div class="mt-2 text-xs ${wordChange.change < 0 ? 'text-green-400' : 'text-red-400'}">
                                        ${wordChange.change < 0 ? '−' : '+'}${Math.abs(wordChange.change)} 单词
                                    </div>
                                </div>
                            </div>
                        `;
                        
                        if (character.isFiveStar) {
                            pullCard.classList.add('card-glow');
                        } else {
                            pullCard.classList.add('four-star-glow');
                        }
                        
                        await new Promise(resolve => setTimeout(resolve, 500));
                    } else {
                        pullCard.innerHTML = `
                            <div class="w-full h-full flex items-center justify-center bg-gray-800">
                                <div class="text-center">
                                    <i class="fa fa-times text-3xl text-gray-500 mb-2"></i>

                        `;
                        await new Promise(resolve => setTimeout(resolve, 200));

                        <i class="fa fa-arrows-h mr-1"></i> 左右滑动查看
                    `;
                    dom.wishArea.appendChild(scrollHint);
                    
                    setTimeout(() => {
                        scrollHint.style.opacity = '0';
                        scrollHint.style.transition = 'opacity 0.5s ease';
                        setTimeout(() => scrollHint.remove(), 500);
                    }, 3000);
                }
                
            } finally {
                dom.pullBtn.disabled = false;
                dom.pullBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                isPulling = false;
                
                updateCounters();
                updateCharacterList();
                
                dom.wishArea.style.overflowX = 'auto';
                dom.wishArea.style.justifyContent = 'flex-start';
            }
        }

        // 更新角色列表
        function updateCharacterList() {
            dom.characterList.innerHTML = '';
            
            if (Object.keys(ownedCharacters).length === 0) {
                const emptyHint = document.createElement('div');
                emptyHint.className = 'text-center text-gray-400 col-span-full py-8';
                emptyHint.textContent = '暂无角色，快去抽卡吧！';
                dom.characterList.appendChild(emptyHint);
                return;
            }
            
            Object.keys(ownedCharacters).forEach(characterName => {
                const characterInfo = phraseDatabase[characterName];
                const isFiveStar = ["Sangonomiya Kokomi", "Keqing", "Qiqi", "Jean", "Mona", "Tighnari", "Dehya", "Ningguang", "Furina"].includes(characterName);
                
                const characterCard = document.createElement('div');
                characterCard.className = `bg-white/5 backdrop-blur-sm rounded-xl p-4 character-appear border ${isFiveStar ? 'border-fiveStar/30' : 'border-fourStar/30'} character-card-hover`;
                characterCard.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${characterInfo.imageUrl}" alt="${characterName}" class="w-16 h-20 object-cover rounded">
                        <div class="flex-1">
                            <div class="flex items-center">
                                <span class="font-medium">${characterName}</span>
                                <span class="ml-2 ${isFiveStar ? 'text-fiveStar' : 'text-fourStar'} text-xs">
                                    ${isFiveStar ? '★★★★★' : '★★★★'}
                                </span>
                            </div>
                            <div class="text-xs text-gray-300 mt-1">
                                <div>短语: ${characterInfo.phrase}</div>
                                <div class="mt-1">例句: ${characterInfo.sentence}</div>
                            </div>
                        </div>
                        <div class="bg-white/10 rounded-full w-6 h-6 flex items-center justify-center text-xs">
                            ${ownedCharacters[characterName]}
                        </div>
                    </div>
                `;
                
                characterCard.addEventListener('click', () => {
                    showCharacterDetail(characterName);
                });
                
                dom.characterList.appendChild(characterCard);
            });
        }

        // 初始化游戏
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body></html>
